server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: "${LAVALINK_SERVER_PASSWORD:youshallnotpass}"
    sources:
      # La fuente de YouTube nativa está deprecada; se reemplaza por el plugin youtube-source de abajo.
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: false
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    playerUpdateInterval: 5
    youtubePlaylistLoadLimit: 6
    playerUpdateIntervalMs: 5000

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - WEBEMBEDDED

  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false # habilítalo manualmente aquí una vez tengas credenciales de MusicKit (ver README)
      deezer: false
      youtube: false
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      # spDc: cookie de sesión de Spotify, solo la usa LavaSrc para la API de letras (lyrics), no
      # para leer playlists (Spotify bloqueó ese endpoint para tokens de solo-app; no hay fix limpio
      # de este lado sin correr un proxy externo aparte). Para playlists usa el link equivalente de
      # YouTube/YouTube Music en vez de Spotify.
      spDc: "${SPOTIFY_SP_DC:}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
    applemusic:
      countryCode: "US"
      # keyID / teamID / musicKitKey van aquí. Ver README para instrucciones (requiere el archivo .p8 de Apple).
      playlistLoadLimit: 6
      albumLoadLimit: 6

metrics:
  prometheus:
    enabled: false

sentry:
  dsn: ""

logging:
  level:
    root: INFO
    lavalink: INFO
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 5
